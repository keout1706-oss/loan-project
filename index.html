<!DOCTYPE html>
<html lang="zh-tw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貸款試算APP V0.1</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/utils.js"></script>

</head>

<body>
    <div class="container">
        <h1>貸款精算助手
            <span class="subtitle">輸入條件，快速分析您的還款計畫</span>
        </h1>

        <hr>
        <form id="loanForm" action="" class="loan-form">
            <div class="form-row">
                <label for="amount">貸款金額</label>
                <input type="number" id="amount" name="amount" value="100" step="10" min="10" required> 萬
            </div>
            <div class="form-row">
                <label for="rate">貸款利率</label>
                <input type="number" id="rate" name="rate" value="1.85" step="0.01" min="1"> %
            </div>

            <!-- 新增手續費用欄位 handlingFree-->
            <!-- <div class="form-row">
                <label for="handlingFree">貸款手續費</label>
                <input type="number" id="handlingFree" name="handlingFree" placeholder="請輸入相關手續費" required> 元
            </div> -->
            <div class="form-row">
                <label for="loanYears">貸款年限</label>
                <select name="loanYears" id="loanYears">
                    <option value="3">3</option>
                    <option value="5">5</option>
                    <option value="7" selected>7</option>
                    <option value="10">10</option>
                    <option value="15">15</option>
                    <option value="20">20</option>
                    <option value="30">30</option>
                    <option value="40">40</option>
                </select> 年
            </div>
            <div class="form-row">
                <label for="repayment">還款方式</label>
                <input type="radio" id="repayment1" name="repayment" value="repaymentMethod1" checked>本金平均攤還
                <input type="radio" id="repayment2" name="repayment" value="repaymentMethod2">本息平均攤還
            </div>
            <!-- 後端才需要submit -->
            <button type="button" id="clacBtn">計算</button>
        </form>
        <h2>| 試算結果
            <button id="exporBtn" type="button">輸出CSV</button>
        </h2>
        <div classs="result">
            <!--摘要表格-->
            <table class="summary-table">
                <thead>
                    <tr>
                        <th>項⽬</th>
                        <th>金額</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>每⽉還款金額</td>
                        <td id="monthlyPayment">--</td>
                    </tr>
                    <tr>
                        <td>總還款金額</td>
                        <td id="totalPayment">--</td>
                    </tr>
                    <tr>
                        <td>總利息支出</td>
                        <td id="totalInterest">--</td>
                    </tr>
                </tbody>
            </table>

            <div id="table-scroll">
                <!--分期明細表格-->
                <table border="1" class="detial-table">
                    <thead>
                        <tr>
                            <th>期數</th>
                            <th>⽉付金額</th>
                            <th>本息</th>
                            <th>利息</th>
                            <th>剩餘本金</th>
                        </tr>
                    </thead>
                    <tbody id="scheduleBody">


                    </tbody>
                </table>
            </div>
        </div>
    </div>


    <script>
        // const title = document.querySelector("h1");
        // console.log(title);

        // // 1.只改文字 2.含標籤語法
        // title.innerText = "超級助手";
        let schedules = [];
        const amountEl = document.querySelector("#amount");
        const rateEl = document.querySelector("#rate");
        const loanYearsEl = document.querySelector("#loanYears");
        const clacBtnEl = document.querySelector("#clacBtn");
        const exporBtnE1 = document.querySelector("#exporBtn")

        console.log(amountEl, rateEl, loanYearsEl, clacBtnEl, exporBtnE1);

        exporBtnE1.addEventListener("click", function (e) {
            console.log(schedules);

            if (schedules.length == 0) {
                alert("目前無資料，請先計算!");
                return;
            }
            let data = [];
            const headers = ["期數", "⽉付金額", "利息", "剩餘本金"];

            for (let i = 0; i < schedules.length; i++) {
                data.push(
                    [
                        schedules[i].month,
                        schedules[i].monthlyPayment + schedules[i].interest,
                        schedules[i].monthlyPayment,
                        schedules[i].interest,
                        schedules[i].amount

                    ]
                )

            }
            console.log(data);
            downloadCSV(headers, data);
        });

        clacBtnEl.addEventListener("click", function (e) {
            let amount = amountEl.value;
            let rate = rateEl.value;
            let loanYears = loanYearsEl.value;

            //多個radio共用name的取值方式
            let method = document.querySelector(
                "input[name='repayment']:checked"
            ).value;

            console.log(amount, rate, loanYears, method);

            schedules = repaymentMethod1(amount * 10000, rate, loanYears);
            renderSummary(schedules);
            renderTable(schedules);
        })


        function renderSummary(schedules) {
            const monthlyPaymentE1 = document.querySelector("#monthlyPayment");
            const totalPaymentE1 = document.querySelector("#totalPayment");
            const totalInterestE1 = document.querySelector("#totalInterest");

            console.log(monthlyPaymentE1, totalPaymentE1, totalInterestE1);

            monthlyPaymentE1.innerText = `第一個月:${schedules[0].monthlyPayment + schedules[0].interest}`;

            let totalPayment = 0, totalInterest = 0;
            for (let i = 0; i < schedules.length; i++) {
                totalInterest += schedules[i].interest;
                totalPayment += schedules[i].monthlyPayment;
            }
            console.log(totalPayment, totalInterest);

            totalPaymentE1.innerHTML = `<b style="color: blue;">${totalPayment + totalInterest}元</b>`
            totalInterestE1.innerHTML = `<b style="color: red;">${totalInterest}元</b>`
        }

        // 複製Table
        function renderTable(schedules) {
            let tableHtml = "";


            for (let i = 0; i < schedules.length; i++) {

                tableHtml += `
                    <tr>
                        <td>${schedules[i].month}</td>
                        <td>${schedules[i].monthlyPayment + schedules[i].interest}</td>
                        <td>${schedules[i].monthlyPayment}</td>
                        <td>${schedules[i].interest}</td>
                        <td>${schedules[i].amount}</td>
                    </tr>
            `;

            }
            console.log(tableHtml);

            document.querySelector("#scheduleBody").innerHTML = tableHtml;
        };



        // 本金平均攤還
        function repaymentMethod1(amount, rate, years) {
            let monthRate = rate / 100 / 12; // 月利率
            let months = years * 12;

            let monthlyPayment = Math.round(amount / months);
            console.log(monthRate, months, monthlyPayment);

            schedules = [];
            for (let i = 0; i < months; i++) {
                let interest = Math.round(amount * monthRate);

                amount -= monthlyPayment;

                //最後一期
                if (i == months - 1) {
                    monthlyPayment += amount;
                    amount = 0;
                }

                console.log(`第${i + 1}期 本金:${monthlyPayment} 利息:${interest} 剩餘餘額 ${amount}`);
                schedules.push(
                    {
                        "month": i + 1,
                        "monthlyPayment": monthlyPayment,
                        "interest": interest,
                        "amount": amount,
                    });



            }
            console.log(schedules);

            return schedules;

        }

    </script>
</body>

</html>
